name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/labareda_ci?sslmode=require
      DATABASE_URL_UNPOOLED: postgresql://ci:ci@localhost:5432/labareda_ci?sslmode=require

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: run quality gate
        run: npm run check
